<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=430, initial-scale=1.0, maximum-scale=1" />
    <style>
      /* 强制手机视口：最大宽度 430px，超宽屏居中显示 */
      html, body { margin: 0; padding: 0; background: #010308; }
      #root {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100dvh;
        position: relative;
        overflow-x: hidden;
        box-shadow: 0 0 60px rgba(0,0,0,0.8);
      }
    </style>
    <title>黄金多空宇宙竞猜 · 金十数据</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- GitHub Pages SPA 路由处理 -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
